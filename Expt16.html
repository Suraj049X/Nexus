<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expt 16</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amita:wght@400;700&family=Bebas+Neue&family=Bonheur+Royale&family=Bungee&family=Felipa&family=Manufacturing+Consent&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Unbounded:wght@200..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Faster+One&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap');

        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgba(0, 0, 0, 0.431);
            position: bottom;
            background-repeat: no-repeat;
            text-align: center;
            color: #fff;
        }

        h2 {
            border: 3px double #fff;
            padding: 2px;
            font-family: 'Bebas Neue';
            letter-spacing: 2px;
            font-size: 50px;
            background-color: #00000067;
            text-shadow: 4px 4px 20px #fff;
        }

        .image {
            margin-right: 2em;
            height: 420px;
            width: 700px;
            float: right;
            margin-top: 1.9%;
            box-shadow: inset 20px 20px 20px #ffffff2f,
             20px 20px  #00000050;
            background-image: url('https://blenderartists.org/uploads/default/original/4X/a/3/3/a33859a490a8b0ebbe8f7dab47e035bb125daa3a.jpeg');
            background-size: cover;
            background-position: center;
            position: top;
            text-align: left;
            border-radius: 20px;
           transition: all 0.4s ease-in;
        }

        li:hover {
            transform: translateX(20px);
        }

        h3:hover{
            transform: translateX(70px);
        }

        

        .text {
            margin: 0.1% 3%;
            color: #fff8f8;
            text-shadow: 0px 0px 4px #fff;
            float: left;
            font-size: 5.5vw;
            font-family:fantasy;
            letter-spacing: 6px;
            line-height: 1.3;
            width: 200px;
            height: 500px;
            transition: all 0.4s ease-in;
        }
  

        .text:hover {
            transform: translateX(8px)
        }

        ul {
            margin-left: 8%;
        }

        li {
            margin-right: 60%;
            font-weight: bold;
            line-height: 3;
            font-family: "Orbitron", sans-serif;
            transition: all 0.4s ease;
        }

        p {
            width: 1em;
            font-size: 2em;
            color: aquamarine;
        }

        h3 {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            font-size: 25px;
            transition: all ease 0.5s;
        }

        audio {
            display: none;
        }


        video {
            filter: brightness(0.5) contrast(1.5);
            filter: grayscale(100%);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -111;
        }
    </style>
</head>

<body>
    <video autoplay loop>
        <source src="Mustang.mp4" class="vdo">
    </video>
    <h1>Experiment 16</h1>
    <hr>
    <br>
    <h2>The Legend: Mustang GT</h2>
    <br>
    <div class="text">
        <marquee behavior="slide" direction="down" width="900" scrollamount="3"> 
            <h1>MUSTANG </h1>
        </marquee>    
        <marquee behavior="slide" direction="right" width="250" scrollamount="2">
            <h1>GT</h1>
        </marquee>
        
    </div>

    <div class="image">
        <p>
        <h3>🔧 Engine & Performance :</h3>
        <ul>
            <li>Engine:5.0-liter V8 <br>(Coyote engine)</li>
            <li>Horsepower: ~480–486 hp (latest models)</li>
            <li>Torque: ~415–420 lb-ft<br> (≈563 Nm)</li>
            <li>0–100 km/h: ~4.2 seconds</li>
            <li>Top Speed: ~250 km/h</li>
        </ul>
        </p>
    </div>



</body>

</html>
