<html>
    <head>

        <style>
            body
            {
                font-family:Georgia, 'Times New Roman', Times, serif;
                background-image: url('https://t4.ftcdn.net/jpg/05/41/75/19/360_F_541751991_vbk7qqrqaHOzxHfliA9Giq8zc6qYUwdw.jpg');
                background-repeat: no-repeat;
                background-size: cover;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .container
            {
                background-image: url('https://t4.ftcdn.net/jpg/04/18/87/09/360_F_418870986_8b0cBx3TuaGwvkqdRQKexh1g4vmpTMrS.jpg');
                background-repeat: no-repeat;
                background-size: cover;
                height: 550px;
                width: 900px;
                padding: 4px;
                margin: 30px; 
                border: 4px solid gray;
                border-radius: 20px;              
            }
            .gallery
            {
                display: grid;
                grid-template-columns: repeat(3,1fr);
                height: 400px;
                width:800px;
                padding-bottom: 20px;
                margin: 30px;
                align-items: center;
                justify-items: center;
                 
            }

            .img
            {
                border: 2px solid rgb(0, 0, 0);
                border-radius: 20px;
                transition: all;
                position: center;
                padding: 2px;
            }

            hr
            {
                border: 3px solid white;
                width: 100%;
            }

            h2
            {
                color: white;
                text-align: center;
            }

            p
            {
                text-align: center;
                color: #000;
                font-size: 15px;
            }

            .img:hover
            {
                transform: scale(1.1);

            }

            .img
            {
                transition: all 0.3s ease;
            }

            h2
            {
                color: #000;
            }

            p
            {
                font-weight: bold;
            }

        </style>
    </head>
