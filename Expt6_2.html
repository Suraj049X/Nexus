<html>
    <head>
        <title>Expt6_2</title>
    </head>

    <style>
        body{
            background-color: rgb(231, 249, 255);
            font-family: comic sans ms;
            font-size: 30px;
        }
        .container{
           display:grid;
           grid-template-columns:repeat(4, 50fr);
           border: 4px dotted rgb(0, 10, 102);
           background-color: rgb(109, 186, 219);
           border-radius: 7px;
           padding: 4px;
              margin: 10px;
        }
        .Input-Devices{
            border: 4px solid rgb(94, 76, 14);
            border-radius: 7px;
            padding: 4px;
           
            background-color: rgb(238, 212, 138);
        }
         .output-Devices{
            border: 4px dashed rgb(0, 68, 12);
            border-radius: 7px;
            padding: 4px;
            
            background-color: rgb(159, 245, 175);
        }

         .storage-devices{
            border: 4px double rgb(71, 26, 0);
            border-radius: 7px;
            padding: 4px;
            
            background-color: rgb(175, 137, 115);
        }

           .processing-unit{
            border: 4px groove rgb(45, 0, 53);
            border-radius: 7px;
            padding: 4px;
            
            background-color: rgb(214, 148, 225);
        }
    </style>

    <body>
        <center><b>Experiment 6_2</b></center>
        <hr style="color:white;">

        <h1><center><u>Types of Computer Devices</u></center></h1>

        <div class="container">
            
            <div class="Input-Devices">
                <ol>Input Devices
                    <li>Keyboard</li>
                    <li>Mouse</li>
                    <li>Scanner</li>
                    </ol>
            </div>
             <div class="output-Devices">
                <ol>Output Devices
                    <li>Monitor</li>
                    <li>Speaker</li>
                    <li>Printer</li>
                </ol>
            </div>

            <div class="storage-devices">
                <ol>Storage Devices
                    <li>Hard Disk</li>
                    <li>CD/DVD</li>
                    <li>Pen Drive</li>
                </ol>
            </div>

            <div class="processing-unit">
                <ol>Processing Unit
                    <li>CPU</li>
                    <li>Motherboard</li>
                    <li>RAM</li>
                </ol>
                </div>
            
         </div>   
</html>
